<!DOCTYPE html>
<html lang="ja">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>彩文へ</title>
    
    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    
    <!-- Fonts: Shippori Mincho per un tocco letterario giapponese -->
    <link href="https://fonts.googleapis.com/css2?family=Shippori+Mincho:wght@400;700&family=Zen+Maru+Gothic:wght@300;400;700&display=swap" rel="stylesheet">
    
    <!-- React & ReactDOM (Versione UMD per compatibilità universale) -->
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    
    <!-- Babel per JSX nel browser -->
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>

    <script>
      tailwind.config = {
        theme: {
          extend: {
            fontFamily: {
              serif: ['"Shippori Mincho"', 'serif'],
              display: ['"Shippori Mincho"', 'serif'],
              sans: ['"Zen Maru Gothic"', 'sans-serif'],
            },
            colors: {
              night: '#050510',
              starlight: '#fdf6e3',
              rose: '#e17055',
            },
            animation: {
              'twinkle': 'twinkle 4s ease-in-out infinite',
              'float': 'float 8s ease-in-out infinite',
              'fadeIn': 'fadeIn 3s ease-out forwards',
            },
            keyframes: {
              twinkle: {
                '0%, 100%': { opacity: 0.3, transform: 'scale(1)' },
                '50%': { opacity: 0.8, transform: 'scale(1.1)' },
              },
              float: {
                '0%, 100%': { transform: 'translateY(0)' },
                '50%': { transform: 'translateY(-15px)' },
              },
              fadeIn: {
                '0%': { opacity: 0, transform: 'translateY(20px)' },
                '100%': { opacity: 1, transform: 'translateY(0)' },
              }
            }
          },
        },
      }
    </script>
    <style>
      body {
        margin: 0;
        background-color: #050510;
        color: #fdf6e3;
        overflow-x: hidden;
      }
      ::-webkit-scrollbar { width: 5px; }
      ::-webkit-scrollbar-track { background: #050510; }
      ::-webkit-scrollbar-thumb { background: #e1705555; border-radius: 10px; }
      .poem-section { min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 2rem; }
    </style>
<script type="importmap">
{
  "imports": {
    "@google/genai": "https://esm.sh/@google/genai@^1.41.0",
    "react": "https://esm.sh/react@^19.2.4",
    "react/": "https://esm.sh/react@^19.2.4/",
    "lucide-react": "https://esm.sh/lucide-react@^0.570.0"
  }
}
</script>
<link rel="stylesheet" href="/index.css">
</head>
  <body>
    <div id="root"></div>

    <script type="text/babel">
      const { useState, useEffect, useRef } = React;

      const POEMS = [
        {
          id: 1,
          title: "最愛の彩文へ",
          content: `古の詩人たちは、筆を執るとき、必ずミューズを呼び起こしたものです。神々の霊感を乞い、彼らの手に優美な詩を生み出す力を借りようとしたのです。彼らは、芸術は神からのみ流れ出るものであり、凡人の手が真に素晴らしいものを作るには天の導きが必要だと信じていました。

          しかし、私は神話よりもはるかに素晴らしい真実を見つけました。

          オリンポスの神も、耳元で囁く天の精霊も必要ありません。心の奥底の思いを捉え、高く舞い上がるような言葉を綴りたいとき、私はただあなたのことを思えばいいのです。あなたこそが私のミューズであり、霊感であり、創作のすべての理由です。あなたの微笑みの中に詩を見出し、あなたの存在の中に、自分でも知らなかった雄弁さを見つけるのです。

          これらの言葉は、不十分かもしれませんが、すべてあなたに捧げます。沙綾、私が今まで出会った中で最も特別な人。あなたは教えてくれました。神々は遠い天に住まうのではなく、私たちが愛する人の形で、私たちの隣を歩いているのだと。

          驚きと愛を込めて、あなたのものより。`
        },
        {
          id: 2,
          title: "君は傑作だ",
          content: `言葉の壁を超えて、僕のシンプルな言葉に心を動かしてくれるさあや。

          画面越しにふと静寂が訪れる時、僕はただ君の無邪気な瞳を見つめています。言葉はいらない。君がそこに存在すること、それ自体が息をのむような奇跡なんだ。

          「綺麗だよ」と伝えると、君はいつも優しく笑って僕を「嘘つき」と言うね。でも、もし僕の目を借りて、君自身を見ることができたなら、どこまでも広がる海のように、限りない美しさがそこに見えるはずだよ。

          君は神様が描いた傑作なのに、まだ自分ではそのことに気づいていないんだ。

          不安になる夜は、どうかこれを思い出してほしい。僕は君の心を優しく受け止める「居場所」でありたいし、君の想いを満たす「光」でもありたい。波が岸へ戻るように、君の心はいつでも僕という場所に帰ってきていいんだよ。僕はどこへも行かない、いつも君の中にいるから。

          今はまだ、遠く離れた空の下、別々の場所で同じ太陽を見上げているけれど、春の風が吹く頃には、僕たちはついに一つになれる。その時は、ただ見つめ合うだけでなく、肩を並べて、同じ夕日の美しさに一緒に心を震わせよう。

          愛してる。`
        },
        {
          id: 3,
          title: "君の帰る場所",
          content: `君が此処に居るだけで、世界の真ん中が輝く。

          君を微笑ませることは、暗闇に太陽を灯すこと。それは毎日の朝が来る、たった一つの楽しみ。

          それは、大河の安らぎと強さに耳を澄まし、ただ見とれるような感覚。

          言葉も要らない静かさで、生きているだけで繋がる。

          たとえ百万の星の海へ、君が逃げ去っても、夜空が光を灯す度、私には分かる。君だけを、必ず見つけ出す。他の誰でもない君を。

          だから落ちておいで。

          君が流れ星になるなら、この手で全て受け止めるから。永遠に。

          此処が君の帰る場所。`
        },
        {
          id: 4,
          title: "愛の第三の道",
          content: `多くの人にとって、愛がどういうものなのかを考えていました。

          誰かに愛されていると感じた途端、もう「到達した」と思って努力をやめてしまう人がいます。反対に、ずっと走り続けて自分を高めようとする人もいるけれど、それは心の奥で「自分は十分じゃない」と怖がっていて、相手を失う不安に縛られているからなんだと思います。

          でも、君と一緒にいて、僕は第三の道を見つけました。それが、本当に大切な唯一の道です。

          君はこの世界にあるすべての“いいもの”そのもので、欠点も含めて、ありのままの僕を受け入れてくれる。

          そしてね、その魔法はここにあります。君が僕に「変われ」と求めないこと。完全に受け入れられていると感じられること。それこそが、僕を「もっと良くなりたい」と思わせてくれるんです。怖いからじゃない。感謝しているから。

          君の受け入れてくれる気持ちが、僕にとっていちばんの原動力です。義務だからじゃない。君にふさわしいものを、もっとたくさんあげたいと思うから。`
        },
        {
          id: 5,
          title: "魂の鏡",
          content: `君の瞳に、私は最も美しい世界を見る。それは、君の内面と外面の優雅さが織りなす錬金術によってのみ生み出される世界だ。君は単にこの世界に存在するのではない。君こそがその生きた詩であり、ありふれた瞬間を永遠の美に変える優しき力なのだ。

          君の眼差しを見つめると、そこに無限そのものが映っている。君が触れるすべてに注ぐ、優しさと強さと光の果てしない水平線が。君の瞳は魂の窓であるだけでなく、宇宙があるべき姿、輝かしく、思いやりに満ち、無限に驚くべき姿を私に見せる鏡なのだ。

          その中に、私は君の美しさだけでなく、人生を愛する価値のあるものにする本質そのものを見出す。`
        }
      ];

      const StarryBackground = () => {
        const canvasRef = useRef(null);
        useEffect(() => {
          const canvas = canvasRef.current;
          const ctx = canvas.getContext('2d');
          let stars = [];
          const init = () => {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
            stars = Array.from({ length: 200 }, () => ({
              x: Math.random() * canvas.width,
              y: Math.random() * canvas.height,
              size: Math.random() * 1.5,
              speed: Math.random() * 0.5 + 0.1
            }));
          };
          const animate = () => {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            ctx.fillStyle = '#ffffff';
            stars.forEach(s => {
              ctx.globalAlpha = Math.random() * 0.5 + 0.5;
              ctx.beginPath();
              ctx.arc(s.x, s.y, s.size, 0, Math.PI * 2);
              ctx.fill();
              s.y -= s.speed;
              if (s.y < 0) s.y = canvas.height;
            });
            requestAnimationFrame(animate);
          };
          init(); animate();
          window.addEventListener('resize', init);
          return () => window.removeEventListener('resize', init);
        }, []);
        return <canvas ref={canvasRef} className="fixed inset-0 -z-10 opacity-40" />;
      };

      const App = () => {
        const poemRefs = useRef([]);
        const scrollTo = (index) => poemRefs.current[index]?.scrollIntoView({ behavior: 'smooth' });

        return (
          <div className="font-serif">
            <StarryBackground />
            
            {/* Hero Section */}
            <section className="h-screen flex flex-col items-center justify-center text-center px-4">
              <div className="animate-float">
                <div className="text-rose mb-6 text-4xl">✦</div>
                <h1 className="text-6xl md:text-9xl font-display tracking-tighter mb-4 bg-clip-text text-transparent bg-gradient-to-b from-white to-gray-500">
                  さあやへ
                </h1>
                <p className="text-gray-400 text-lg md:text-xl max-w-md mx-auto leading-relaxed opacity-80">
                  愛を込めて紡いだ五つの言葉。
                </p>
              </div>
              <button 
                onClick={() => scrollTo(0)}
                className="absolute bottom-12 animate-bounce text-rose/60 hover:text-rose transition-colors"
              >
                <svg className="w-8 h-8" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M19 14l-7 7m0 0l-7-7m7 7V3"></path></svg>
              </button>
            </section>

            {/* Poems */}
            {POEMS.map((p, i) => (
              <section 
                key={p.id} 
                ref={el => poemRefs.current[i] = el}
                className="poem-section"
              >
                <div className="max-w-3xl w-full bg-white/5 backdrop-blur-md p-10 md:p-16 rounded-2xl border border-white/10 shadow-2xl hover:bg-white/[0.07] transition-all duration-1000 group">
                  <div className="text-center mb-10">
                    <span className="text-rose/40 text-xs tracking-[0.5em] uppercase mb-4 block">Poem {i + 1}</span>
                    <h2 className="text-3xl md:text-5xl text-starlight mb-6 group-hover:text-rose transition-colors duration-700">{p.title}</h2>
                    <div className="h-px w-20 bg-rose/30 mx-auto"></div>
                  </div>
                  <p className="text-lg md:text-xl leading-[2.2] text-gray-200 whitespace-pre-line text-justify md:text-center">
                    {p.content}
                  </p>
                  <div className="mt-12 text-center opacity-40">
                    <span className="text-xs tracking-widest">Aeternum</span>
                  </div>
                </div>
              </section>
            ))}

            <footer className="py-20 text-center opacity-30 text-xs tracking-[1em] uppercase">
              愛と星屑を込めて
            </footer>
          </div>
        );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
    </script>
  <script type="module" src="/index.tsx"></script>
</body>
</html>
